<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Мой юнгианский профиль</title>
    <!-- Telegram Mini App SDK: даёт initData, themeParams, expand() и т.п. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <!-- Экран загрузки по умолчанию; app.js подменяет содержимое -->
      <section class="state" id="state">
        <div class="spinner" aria-hidden="true"></div>
        <p class="muted">Собираю, что я о тебе понял…</p>
      </section>
    </main>

    <!-- Конфиг бэкенда отдельным файлом: правится при деплое, не трогая логику. -->
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
